<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding:20px;
}

.chart{
height:200px;
background:#1e293b;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
margin-top:20px;
}

select{
width:220px;
padding:10px;
font-size:16px;
margin-top:20px;
border-radius:6px;
}

.button{
background:#22c55e;
padding:15px;
border-radius:10px;
margin-top:20px;
font-size:18px;
cursor:pointer;
}

.loading{
margin-top:20px;
font-size:18px;
color:#facc15;
animation: blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

</style>

</head>

<body>

<div class="container">

<h2>AI Trading Scanner</h2>

<div class="chart">
📈 Market Chart
</div>

<h3>Выберите валютную пару</h3>

<select id="pair">

<option>EUR/USD</option>
<option>GBP/USD</option>
<option>USD/JPY</option>
<option>AUD/USD</option>
<option>USD/CAD</option>
<option>USD/CHF</option>
<option>NZD/USD</option>
<option>EUR/GBP</option>
<option>BTC/USDT</option>
<option>ETH/USDT</option>

</select>

<div class="button" onclick="analyze()">
📊 Получить сигнал
</div>

<div id="loading"></div>
<div id="signal"></div>

</div>

<script>

let times=["30 секунд","1 минута","3 минуты","5 минут"]

function analyze(){

document.getElementById("signal").innerHTML=""
document.getElementById("loading").innerHTML="🤖 AI анализирует рынок..."

setTimeout(generateSignal,2000)

}

function generateSignal(){

document.getElementById("loading").innerHTML=""

let pair=document.getElementById("pair").value

let direction=Math.random()>0.5?"BUY 🟢":"SELL 🔴"

let time=times[Math.floor(Math.random()*times.length)]

let win=Math.floor(Math.random()*(90-65+1))+65

document.getElementById("signal").innerHTML=

`
<h3>AI SIGNAL</h3>

<p>Пара: ${pair}</p>

<p>Направление: ${direction}</p>

<p>⏱ Время сделки: ${time}</p>

<p>📈 Вероятность прохода: ${win}%</p>
`

}

</script>

</body>

</html>
